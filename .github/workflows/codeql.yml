# CodeQL security analysis for the C# codebase. Runs on pushes/PRs to main and weekly, on
# windows-latest (the WPF/Service projects are Windows-only). Uses a manual build of the solution so
# analysis sees the exact compilation the per-PR gate builds.
name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '23 5 * * 1'   # Mondays 05:23 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (C#)
    runs-on: windows-latest
    timeout-minutes: 60
    permissions:
      security-events: write   # upload results to the Security tab
      actions: read
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.422'   # pinned to match CI (a newer floating SDK breaks the strict build)

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: csharp
          build-mode: manual

      - name: Build solution
        run: dotnet build DnsCryptControl.sln -c Release

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:csharp"
